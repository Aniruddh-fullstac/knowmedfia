<svg viewBox="0 0 1200 540" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="topo-t topo-d" preserveAspectRatio="xMidYMid meet">
<title id="topo-t">KnowMedia · System topology</title>
<desc id="topo-d">Horizontal architecture. Creator on the left flows through the Experience layer, API Gateway, Intelligence plane, and Model and data plane. Three parallel rails (Generation, Automation, Analytics) carry requests across every tier. Firebase sits below as the shared data platform.</desc>
<defs>
  <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M1 1.5 L8.5 5 L1 8.5" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <filter id="sh" x="-10%" y="-30%" width="120%" height="160%">
    <feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#0f172a" flood-opacity="0.07"/>
  </filter>
  <style>
    .h    { font: 700 10px ui-sans-serif, system-ui, -apple-system, "Anthropic Sans", sans-serif; letter-spacing: 0.14em; fill: #64748b; text-anchor: middle; }
    .lbl  { font: 600 13px ui-sans-serif, system-ui, -apple-system, "Anthropic Sans", sans-serif; text-anchor: middle; dominant-baseline: middle; fill: #1f1e1d; }
    .lbl-w{ font: 600 13px ui-sans-serif, system-ui, -apple-system, "Anthropic Sans", sans-serif; text-anchor: middle; dominant-baseline: middle; fill: #ffffff; }
    .sub  { font: 400 10.5px ui-sans-serif, system-ui, -apple-system, "Anthropic Sans", sans-serif; text-anchor: middle; dominant-baseline: middle; fill: #6e6b65; }
    .e    { font: 500 10px ui-sans-serif, system-ui, -apple-system, "Anthropic Sans", sans-serif; fill: #64748b; text-anchor: middle; }
    .node { fill: #ffffff; stroke: #d6d3cd; stroke-width: 1; }
    .flow { stroke: #a8a59e; stroke-width: 1.4; fill: none; stroke-linecap: round; }
    .bold { stroke: #475569; stroke-width: 1.8; fill: none; stroke-linecap: round; }
    .dot  { stroke: #94a3b8; stroke-width: 1.2; fill: none; stroke-linecap: round; stroke-dasharray: 3 3; }
  </style>
</defs>

<rect width="1200" height="540" fill="#fafaf9"/>

<rect x="180" y="80"  width="940" height="58" rx="12" fill="#f0fdf4" opacity="0.7"/>
<rect x="180" y="148" width="940" height="58" rx="12" fill="#fff7ed" opacity="0.7"/>
<rect x="180" y="216" width="940" height="58" rx="12" fill="#eff6ff" opacity="0.7"/>

<text class="h" x="1110" y="113" text-anchor="end" fill="#16a34a">GENERATION</text>
<text class="h" x="1110" y="181" text-anchor="end" fill="#c2410c">AUTOMATION</text>
<text class="h" x="1110" y="249" text-anchor="end" fill="#2563eb">ANALYTICS</text>

<text class="h" x="80"  y="30">CREATOR</text>
<text class="h" x="290" y="30">EXPERIENCE</text>
<text class="h" x="520" y="30">API GATEWAY</text>
<text class="h" x="750" y="30">INTELLIGENCE</text>
<text class="h" x="980" y="30">MODEL &amp; DATA</text>

<line x1="180" y1="42" x2="180" y2="284" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="2 3"/>
<line x1="405" y1="42" x2="405" y2="284" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="2 3"/>
<line x1="635" y1="42" x2="635" y2="284" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="2 3"/>
<line x1="865" y1="42" x2="865" y2="284" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="2 3"/>

<!-- ═════ CREATOR ═════ -->
<rect x="30" y="160" width="100" height="40" rx="20" fill="#DA7756" stroke="#DA7756" stroke-width="1" filter="url(#sh)"/>
<text class="lbl-w" x="80" y="180">Creator</text>

<!-- ═════ EXPERIENCE ═════ -->
<g>
  <rect class="node" x="200" y="86" width="200" height="46" rx="8" filter="url(#sh)"/>
  <circle cx="215" cy="109" r="3.5" fill="#6366F1"/>
  <text class="lbl" x="307" y="103">Next.js 15 App</text>
  <text class="sub" x="307" y="120">React 19 · Tailwind v4</text>
</g>
<g>
  <rect class="node" x="200" y="154" width="200" height="46" rx="8" filter="url(#sh)"/>
  <circle cx="215" cy="177" r="3.5" fill="#6366F1"/>
  <text class="lbl" x="307" y="171">Studio surfaces</text>
  <text class="sub" x="307" y="188">Tremor · Fabric · Recharts</text>
</g>
<g>
  <rect class="node" x="200" y="222" width="200" height="46" rx="8" filter="url(#sh)"/>
  <circle cx="215" cy="245" r="3.5" fill="#F59E0B"/>
  <text class="lbl" x="307" y="239">Firebase Auth</text>
  <text class="sub" x="307" y="256">Google SSO</text>
</g>

<!-- ═════ API GATEWAY ═════ -->
<g>
  <rect class="node" x="430" y="86" width="195" height="46" rx="8" filter="url(#sh)"/>
  <line x1="434" y1="90" x2="434" y2="128" stroke="#d6d3cd" stroke-width="1"/>
  <line x1="621" y1="90" x2="621" y2="128" stroke="#d6d3cd" stroke-width="1"/>
  <circle cx="447" cy="109" r="3.5" fill="#7c3aed"/>
  <text class="lbl" x="528" y="111">/api/generate/*</text>
</g>
<g>
  <rect class="node" x="430" y="154" width="195" height="46" rx="8" filter="url(#sh)"/>
  <line x1="434" y1="158" x2="434" y2="196" stroke="#d6d3cd" stroke-width="1"/>
  <line x1="621" y1="158" x2="621" y2="196" stroke="#d6d3cd" stroke-width="1"/>
  <circle cx="447" cy="177" r="3.5" fill="#7c3aed"/>
  <text class="lbl" x="528" y="179">/api/automate/*</text>
</g>
<g>
  <rect class="node" x="430" y="222" width="195" height="46" rx="8" filter="url(#sh)"/>
  <line x1="434" y1="226" x2="434" y2="264" stroke="#d6d3cd" stroke-width="1"/>
  <line x1="621" y1="226" x2="621" y2="264" stroke="#d6d3cd" stroke-width="1"/>
  <circle cx="447" cy="245" r="3.5" fill="#7c3aed"/>
  <text class="lbl" x="528" y="247">/api/analytics/[user]</text>
</g>

<!-- ═════ INTELLIGENCE ═════ -->
<g>
  <rect class="node" x="655" y="86" width="200" height="46" rx="8" filter="url(#sh)"/>
  <circle cx="670" cy="109" r="3.5" fill="#10B981"/>
  <text class="lbl" x="762" y="103">Generation</text>
  <text class="sub" x="762" y="120">copy · imagery</text>
</g>
<g>
  <rect class="node" x="655" y="154" width="200" height="46" rx="8" filter="url(#sh)"/>
  <circle cx="670" cy="177" r="3.5" fill="#10B981"/>
  <text class="lbl" x="762" y="171">Automation</text>
  <text class="sub" x="762" y="188">email · WhatsApp blasts</text>
</g>
<g>
  <rect class="node" x="655" y="222" width="200" height="46" rx="8" filter="url(#sh)"/>
  <circle cx="670" cy="245" r="3.5" fill="#10B981"/>
  <text class="lbl" x="762" y="239">Analytics</text>
  <text class="sub" x="762" y="256">aggregation · insights</text>
</g>

<!-- ═════ MODEL & DATA (hexagons) ═════ -->
<g>
  <path d="M 905 86 L 1055 86 L 1080 109 L 1055 132 L 905 132 L 880 109 Z" class="node" filter="url(#sh)"/>
  <circle cx="897" cy="109" r="3.5" fill="#DA7756"/>
  <text class="lbl" x="980" y="103">Google Gemini</text>
  <text class="sub" x="980" y="120">@google/genai</text>
</g>
<g>
  <path d="M 905 154 L 1055 154 L 1080 177 L 1055 200 L 905 200 L 880 177 Z" class="node" filter="url(#sh)"/>
  <circle cx="897" cy="177" r="3.5" fill="#DA7756"/>
  <text class="lbl" x="980" y="171">FastAPI sidecar</text>
  <text class="sub" x="980" y="188">localhost:8000</text>
</g>
<g>
  <path d="M 905 222 L 1055 222 L 1080 245 L 1055 268 L 905 268 L 880 245 Z" class="node" filter="url(#sh)"/>
  <circle cx="897" cy="245" r="3.5" fill="#DA7756"/>
  <text class="lbl" x="980" y="239">Instagram Graph</text>
  <text class="sub" x="980" y="256">graph.facebook.com</text>
</g>

<!-- ═════ FIREBASE PLATFORM (shared, bottom) ═════ -->
<g>
  <path d="M 220 370 Q 220 350 250 350 L 1100 350 Q 1130 350 1130 385 L 1130 425 Q 1130 460 1100 460 L 250 460 Q 220 460 220 440 Z" class="node" filter="url(#sh)"/>
  <ellipse cx="675" cy="355" rx="455" ry="6" fill="#fef3c7" opacity="0.4"/>
  <text class="h" x="675" y="378" fill="#92400e">SHARED DATA PLATFORM</text>
  <circle cx="245" cy="405" r="4" fill="#F59E0B"/>
  <text class="lbl" x="675" y="402" style="font-size:14px">Firebase Admin</text>
  <text class="sub" x="675" y="422">auth tokens · firestore · session storage · analytics cache · send logs</text>
  <circle cx="1105" cy="405" r="4" fill="#F59E0B"/>
</g>

<!-- ═════ CONNECTIONS ═════ -->
<!-- Creator → SPA (composes) -->
<path d="M 130 180 Q 165 180 165 109 L 198 109" class="bold" marker-end="url(#ar)"/>
<text class="e" x="158" y="142">composes</text>

<!-- Creator → Auth (signs in) -->
<path d="M 130 180 Q 165 180 165 245 L 198 245" class="bold" marker-end="url(#ar)"/>
<text class="e" x="158" y="215">signs in</text>

<!-- SPA → 3 routes (HTTP fan-out) -->
<line x1="400" y1="109" x2="428" y2="109" class="flow" marker-end="url(#ar)"/>
<path d="M 400 109 Q 415 109 415 177 L 428 177" class="flow" marker-end="url(#ar)"/>
<path d="M 400 109 Q 415 109 415 245 L 428 245" class="flow" marker-end="url(#ar)"/>
<text class="e" x="415" y="78">HTTP</text>

<!-- Routes → Logic (1:1) -->
<line x1="625" y1="109" x2="653" y2="109" class="flow" marker-end="url(#ar)"/>
<line x1="625" y1="177" x2="653" y2="177" class="flow" marker-end="url(#ar)"/>
<line x1="625" y1="245" x2="653" y2="245" class="flow" marker-end="url(#ar)"/>

<!-- Logic → Providers (with labels) -->
<line x1="855" y1="109" x2="878" y2="109" class="flow" marker-end="url(#ar)"/>
<text class="e" x="866" y="78">prompt</text>

<line x1="855" y1="177" x2="878" y2="177" class="flow" marker-end="url(#ar)"/>
<text class="e" x="866" y="146">publish</text>

<line x1="855" y1="245" x2="878" y2="245" class="flow" marker-end="url(#ar)"/>
<text class="e" x="866" y="214">metrics</text>

<!-- FastAPI sidecar → Instagram Graph (vertical inside providers) -->
<path d="M 990 200 L 990 218" class="flow" marker-end="url(#ar)"/>
<text class="e" x="1030" y="214">graph calls</text>

<!-- Auth → Firebase (session, dotted) -->
<path d="M 307 268 L 307 320 L 285 320 L 285 350" class="dot" marker-end="url(#ar)"/>
<text class="e" x="335" y="312">session</text>

<!-- Automation → Firebase (log, dotted) -->
<path d="M 762 200 L 762 320 L 770 320 L 770 350" class="dot" marker-end="url(#ar)"/>
<text class="e" x="790" y="312">log</text>

<!-- Analytics → Firebase (cache, dotted) -->
<path d="M 762 268 L 762 320 L 745 320 L 745 350" class="dot" marker-end="url(#ar)"/>
<text class="e" x="720" y="312">cache</text>

<!-- ═════ LEGEND ═════ -->
<g transform="translate(30, 495)">
  <text class="h" x="0" y="0" text-anchor="start">LEGEND</text>
  <line x1="68" y1="-4" x2="100" y2="-4" stroke="#475569" stroke-width="1.8" stroke-linecap="round"/>
  <text class="e" x="118" y="-2" text-anchor="start">primary</text>
  <line x1="166" y1="-4" x2="198" y2="-4" stroke="#a8a59e" stroke-width="1.4" stroke-linecap="round"/>
  <text class="e" x="218" y="-2" text-anchor="start">request</text>
  <line x1="262" y1="-4" x2="294" y2="-4" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="3 3" stroke-linecap="round"/>
  <text class="e" x="320" y="-2" text-anchor="start">auxiliary</text>
  <circle cx="395" cy="-4" r="3.5" fill="#6366F1"/>
  <text class="e" x="415" y="-2" text-anchor="start" fill="#1e3a8a">UI</text>
  <circle cx="445" cy="-4" r="3.5" fill="#7c3aed"/>
  <text class="e" x="465" y="-2" text-anchor="start" fill="#4c1d95">route</text>
  <circle cx="510" cy="-4" r="3.5" fill="#10B981"/>
  <text class="e" x="530" y="-2" text-anchor="start" fill="#14532d">logic</text>
  <circle cx="575" cy="-4" r="3.5" fill="#DA7756"/>
  <text class="e" x="595" y="-2" text-anchor="start" fill="#7c2d12">provider</text>
  <circle cx="660" cy="-4" r="3.5" fill="#F59E0B"/>
  <text class="e" x="680" y="-2" text-anchor="start" fill="#92400e">data</text>
</g>
</svg>
