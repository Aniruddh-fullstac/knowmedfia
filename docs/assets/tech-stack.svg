<title id="ts-t">KnowMedia · Tech stack</title>
<desc id="ts-d">Five-column technology stack diagram. From left to right: UI and design, server runtime, AI plane, data services, and operations. Each column groups its named dependencies as labeled chips, with subtle arrows showing layered flow between columns.</desc>
